name: Skynet 2-Minute Heartbeat

on:
  schedule:
    - cron: '*/5 * * * *'  
  workflow_dispatch:       

jobs:
  ingest-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests supabase

      - name: Run 1st Sync
        run: python ingestor.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}

      - name: Wait 120 seconds
        run: sleep 120

      - name: Run 2nd Sync
        run: python ingestor.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
